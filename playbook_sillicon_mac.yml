- name: Apple Silicon Mac setup
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - vars/packages.yml

  tasks:
    - name: macOS system defaults
      tags: macos
      ansible.builtin.import_tasks: tasks/macos.yml

    - name: Homebrew formulae
      tags: homebrew
      ansible.builtin.import_tasks: tasks/homebrew.yml

    - name: Rosetta 2
      tags: rosetta
      ansible.builtin.import_tasks: tasks/rosetta.yml

    # Homebrew Cask apps は sillicon_mac_setup.zsh の Step 5.5 で
    # 先行インストール済み (interactive TTY が必要なため Ansible からは扱わない)。

    - name: App Store apps
      tags: appstore
      ansible.builtin.import_tasks: tasks/appstore.yml

    - name: Git identity and SSH commit signing
      tags: git
      ansible.builtin.import_tasks: tasks/git.yml

    - name: Fonts
      tags: font
      ansible.builtin.import_tasks: tasks/fonts.yml

    - name: Terminal.app defaults
      tags: terminal
      ansible.builtin.import_tasks: tasks/terminal.yml

    - name: Oh My Zsh and zshrc
      tags: zshrc
      ansible.builtin.import_tasks: tasks/zshrc.yml

    - name: nvm and Node.js
      tags: nvm
      ansible.builtin.import_tasks: tasks/nvm.yml
