- name: Apple Silicon Mac setup
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - vars/packages.yml

  tasks:
    - name: macOS system defaults
      tags: macos
      ansible.builtin.import_tasks: tasks/macos.yml

    - name: Homebrew formulae
      tags: homebrew
      ansible.builtin.import_tasks: tasks/homebrew.yml

    - name: Rosetta 2
      tags: rosetta
      ansible.builtin.import_tasks: tasks/rosetta.yml

    # Homebrew Cask apps と App Store apps は sillicon_mac_setup.zsh の
    # Step 5.5 / Step 5.6 で先行インストール済み (interactive TTY が必要なため
    # Ansible 配下の subprocess sudo では TTY 不足でコケる)。

    - name: Git identity and SSH commit signing
      tags: git
      ansible.builtin.import_tasks: tasks/git.yml

    - name: Fonts
      tags: font
      ansible.builtin.import_tasks: tasks/fonts.yml

    - name: Terminal.app defaults
      tags: terminal
      ansible.builtin.import_tasks: tasks/terminal.yml

    - name: Oh My Zsh and zshrc
      tags: zshrc
      ansible.builtin.import_tasks: tasks/zshrc.yml

    - name: Claude Code global configuration
      tags: claude
      ansible.builtin.import_tasks: tasks/claude.yml

    - name: fnm and Node.js
      tags: fnm
      ansible.builtin.import_tasks: tasks/fnm.yml
