---
# Apple Silicon 上で Intel バイナリを動かすため Rosetta 2 をインストール

- name: Check whether Rosetta 2 is installed
  ansible.builtin.command: pkgutil --pkgs com.apple.pkg.RosettaUpdateAuto
  register: rosetta_check
  failed_when: false
  changed_when: false

- name: Install Rosetta 2
  ansible.builtin.command:
    cmd: /usr/sbin/softwareupdate --install-rosetta --agree-to-license
  when: rosetta_check.rc != 0
  changed_when: true
