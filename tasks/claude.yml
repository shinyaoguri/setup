---
# Claude Code グローバル設定 (CLAUDE.md / settings.json / statusLine スクリプト) と
# 全プロジェクト共通スキル (claude/skills/*) のリンク

# runcat-statusline.py は RunCat Neo の Custom Metrics 連携 (statusLine から
# ~/.claude/runcat-usage.json を書き出す)。実体は上流サンプルのまま置き、
# 差分追従しやすくする: https://github.com/runcat-dev/RunCatNeo/tree/main/docs/samples/claude-code
- name: Define Claude global config files
  ansible.builtin.set_fact:
    claude_config_files:
      - CLAUDE.md
      - settings.json
      - runcat-statusline.py

- name: Create ~/.claude directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.claude"
    state: directory
    mode: "0700"

- name: Check existing global config files
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.claude/{{ item }}"
  register: claude_config_stats
  loop: "{{ claude_config_files }}"

- name: Back up existing config if it is a regular file
  ansible.builtin.copy:
    src: "{{ ansible_facts['env']['HOME'] }}/.claude/{{ item.item }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/{{ item.item }}.bak-{{ ansible_facts['date_time']['date'] }}"
    remote_src: true
    mode: preserve
  when: item.stat.exists and not item.stat.islnk
  loop: "{{ claude_config_stats.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Create symlinks for global config files
  ansible.builtin.file:
    src: "{{ playbook_dir }}/claude/{{ item }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/{{ item }}"
    state: link
    force: true
  loop: "{{ claude_config_files }}"

# 全プロジェクト共通の汎用スキル。実体は claude/skills/<name>/ に置き、
# 各スキルを ~/.claude/skills/<name> へ個別 symlink する。個別リンクなので
# ~/.claude/skills 内の他資産 (plugin init のスクラッチ等) とは混ざらない。
# claude/skills/ を走査するため、スキル追加時に本 playbook の変更は不要。
- name: Ensure ~/.claude/skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.claude/skills"
    state: directory
    mode: "0700"

- name: Find repo-managed global skills
  ansible.builtin.find:
    paths: "{{ playbook_dir }}/claude/skills"
    file_type: directory
    recurse: false
  register: claude_global_skills

- name: Symlink each repo-managed skill into ~/.claude/skills
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/skills/{{ item.path | basename }}"
    state: link
    force: true
  loop: "{{ claude_global_skills.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
